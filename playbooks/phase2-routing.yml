---
- name: Phase 2 - configure OpenStack forwarding and SNAT
  hosts: openstack_edge_nodes
  gather_facts: true
  become: true
  roles:
    - role: openstack_edge_gateway
      tags: [gateway, nftables, snat]

- name: Phase 2 - configure VPS routes to provider network
  hosts:
    - edge_vps
    - openstack_edge_nodes
  gather_facts: true
  become: true
  roles:
    - role: vps_edge_routing
      tags: [routing]
