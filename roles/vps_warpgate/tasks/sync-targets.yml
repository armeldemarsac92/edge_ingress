---
- name: Validate Warpgate API token
  ansible.builtin.assert:
    that:
      - warpgate_admin_token_effective is defined
      - warpgate_admin_token_effective | length > 0
    fail_msg: "Warpgate target synchronization requires WARPGATE_ADMIN_TOKEN in {{ warpgate_base_dir }}/.env."
    quiet: true
  no_log: "{{ warpgate_hide_secrets }}"

- name: Look up Warpgate SSH targets
  ansible.builtin.uri:
    url: "https://{{ warpgate_http_bind }}/@warpgate/api/targets?search={{ item.name | urlencode }}"
    method: GET
    headers:
      X-Warpgate-Token: "{{ warpgate_admin_token_effective }}"
    validate_certs: false
    return_content: true
    status_code: 200
  loop: "{{ warpgate_ssh_targets_effective }}"
  loop_control:
    label: "{{ item.name }}"
  register: warpgate_target_lookups
  no_log: "{{ warpgate_hide_secrets }}"

- name: Upsert Warpgate SSH targets
  ansible.builtin.uri:
    url: "https://{{ warpgate_http_bind }}/@warpgate/api/targets{{ '/' ~ warpgate_existing_target.id if warpgate_existing_target.id is defined else '' }}"
    method: "{{ 'PUT' if warpgate_existing_target.id is defined else 'POST' }}"
    headers:
      X-Warpgate-Token: "{{ warpgate_admin_token_effective }}"
    validate_certs: false
    body_format: json
    body:
      name: "{{ item.name }}"
      description: "{{ item.description | default('Inventory host ' ~ item.name) }}"
      options:
        kind: Ssh
        host: "{{ item.host }}"
        port: "{{ item.port | default(22) | int }}"
        username: "{{ item.username }}"
        allow_insecure_algos: "{{ item.allow_insecure_algos | default(false) | bool }}"
        auth:
          kind: PublicKey
    status_code:
      - 200
      - 201
  vars:
    warpgate_matching_targets: "{{ warpgate_target_lookups.results[target_index].json | default([]) | selectattr('name', 'equalto', item.name) | list }}"
    warpgate_existing_target: "{{ warpgate_matching_targets | first | default({}) }}"
  loop: "{{ warpgate_ssh_targets_effective }}"
  loop_control:
    index_var: target_index
    label: "{{ item.name }}"
  register: warpgate_target_upserts
  changed_when: warpgate_existing_target.id is not defined
  no_log: "{{ warpgate_hide_secrets }}"
