---
teleport_enabled: false

teleport_version: "{{ lookup('env', 'TELEPORT_VERSION') | default('18.8.3', true) }}"
teleport_edition: "{{ lookup('env', 'TELEPORT_EDITION') | default('oss', true) }}"
teleport_install_script_url: https://cdn.teleport.dev/install.sh
teleport_install_script_path: /tmp/teleport-install.sh

teleport_base_dir: "{{ lookup('env', 'TELEPORT_BASE_DIR') | default('/opt/edge/teleport', true) }}"
teleport_config_path: /etc/teleport.yaml
teleport_data_dir: /var/lib/teleport
teleport_log_severity: INFO
teleport_service_name: teleport

teleport_domain: "{{ lookup('env', 'TELEPORT_DOMAIN') | default('teleport.' ~ edge_public_root_domain, true) }}"
teleport_cluster_name: "{{ lookup('env', 'TELEPORT_CLUSTER_NAME') | default(teleport_domain, true) }}"

teleport_auth_listen_addr: 127.0.0.1:3025
teleport_web_listen_addr: 127.0.0.1:3080
teleport_proxy_public_addr: "{{ teleport_domain }}:443"
teleport_proxy_ssh_listen_addr: 0.0.0.0:3023
teleport_proxy_ssh_public_addr: "{{ teleport_domain }}:{{ teleport_proxy_ssh_public_port }}"
teleport_proxy_ssh_public_port: "{{ lookup('env', 'TELEPORT_SSH_PUBLIC_PORT') | default('3023', true) | int }}"
teleport_proxy_tunnel_listen_addr: 127.0.0.1:3024
teleport_authentication_type: "{{ 'oidc' if teleport_oidc_enabled | bool else 'local' }}"
teleport_second_factor: "on"

teleport_haproxy_enabled: true
teleport_haproxy_cert_path: "{{ lookup('env', 'TELEPORT_HAPROXY_CERT_PATH') | default('/etc/haproxy/certs/' ~ teleport_domain ~ '.pem', true) }}"
teleport_haproxy_app:
  name: teleport
  hostnames:
    - "{{ teleport_domain }}"
  backend_host: "{{ teleport_web_listen_addr.split(':')[0] }}"
  backend_port: "{{ teleport_web_listen_addr.split(':')[1] | int }}"
  backend_tls: true
  backend_tls_verify: false
  tls_cert: "{{ teleport_haproxy_cert_path }}"
  hsts: true

teleport_oidc_enabled: "{{ teleport_authentik_oidc_client_id | length > 0 and teleport_authentik_oidc_client_secret | length > 0 }}"
teleport_oidc_connector_name: authentik
teleport_oidc_display: Authentik
teleport_authentik_oidc_client_id: "{{ lookup('env', 'TELEPORT_OIDC_CLIENT_ID') | default('', true) }}"
teleport_authentik_oidc_client_secret: "{{ lookup('env', 'TELEPORT_OIDC_CLIENT_SECRET') | default('', true) }}"
teleport_authentik_oidc_issuer_url: "{{ lookup('env', 'TELEPORT_OIDC_ISSUER_URL') | default('https://' ~ authentik_domain ~ '/application/o/teleport/', true) if authentik_domain is defined else '' }}"
teleport_oidc_redirect_urls:
  - "https://{{ teleport_domain }}/v1/webapi/oidc/callback"
teleport_oidc_scope:
  - openid
  - email
  - profile
  - groups
teleport_oidc_claims_to_roles:
  - claim: groups
    value: "{{ lookup('env', 'TELEPORT_ADMIN_GROUP') | default('teleport-admins', true) }}"
    roles:
      - edge-admin

teleport_default_logins: "{{ lookup('env', 'TELEPORT_DEFAULT_LOGINS') | default(edge_vps_ssh_user | default('root'), true) | split(',') | map('trim') | list }}"
teleport_managed_roles:
  - name: edge-admin
    allow:
      logins: "{{ teleport_default_logins }}"
      node_labels:
        "*": "*"
    options:
      max_session_ttl: 12h
