---
- name: Skip Teleport when disabled
  ansible.builtin.debug:
    msg: "teleport_enabled is false; skipping Teleport deployment."
  when: not teleport_enabled | bool

- name: Configure Teleport
  when: teleport_enabled | bool
  block:
    - name: Validate Teleport inputs
      ansible.builtin.assert:
        that:
          - teleport_domain is match('^[A-Za-z0-9_.-]+$')
          - teleport_cluster_name | length > 0
          - teleport_base_dir is match('^/')
          - teleport_config_path is match('^/')
          - teleport_data_dir is match('^/')
          - teleport_auth_listen_addr is match('^[0-9.]+:[0-9]+$')
          - teleport_web_listen_addr is match('^[0-9.]+:[0-9]+$')
          - teleport_proxy_ssh_listen_addr is match('^[0-9.]+:[0-9]+$')
          - teleport_proxy_ssh_public_port | int > 0
          - teleport_proxy_ssh_public_port | int <= 65535
          - teleport_edition in ['oss', 'enterprise']
        fail_msg: "Invalid Teleport inventory variables."
        quiet: true

    - name: Validate Teleport OIDC inputs when enabled
      ansible.builtin.assert:
        that:
          - teleport_authentik_oidc_issuer_url is match('^https://')
          - teleport_authentik_oidc_client_id | length > 0
          - teleport_authentik_oidc_client_secret | length > 0
          - teleport_oidc_claims_to_roles | length > 0
        fail_msg: "Teleport OIDC requires issuer URL, client credentials, and claims_to_roles mappings."
        quiet: true
      no_log: true
      when: teleport_oidc_enabled | bool

    - name: Refresh apt cache before Teleport prerequisites
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      when: ansible_os_family == "Debian"

    - name: Install Teleport install prerequisites
      ansible.builtin.package:
        name:
          - ca-certificates
          - curl
        state: present

    - name: Check installed Teleport version
      ansible.builtin.command: teleport version
      register: teleport_installed_version
      failed_when: false
      changed_when: false

    - name: Download Teleport install script
      ansible.builtin.get_url:
        url: "{{ teleport_install_script_url }}"
        dest: "{{ teleport_install_script_path }}"
        owner: root
        group: root
        mode: "0755"
      when:
        - not ansible_check_mode
        - teleport_installed_version.rc != 0 or teleport_version not in teleport_installed_version.stdout

    - name: Install Teleport package
      ansible.builtin.command:
        cmd: "bash {{ teleport_install_script_path }} {{ teleport_version }} {{ teleport_edition }}"
      changed_when: true
      when:
        - not ansible_check_mode
        - teleport_installed_version.rc != 0 or teleport_version not in teleport_installed_version.stdout

    - name: Create Teleport resource directory
      ansible.builtin.file:
        path: "{{ teleport_base_dir }}/resources"
        state: directory
        owner: root
        group: root
        mode: "0750"

    - name: Render Teleport config
      ansible.builtin.template:
        src: teleport.yaml.j2
        dest: "{{ teleport_config_path }}"
        owner: root
        group: root
        mode: "0600"
      notify: Restart Teleport

    - name: Flush Teleport handlers before service checks
      ansible.builtin.meta: flush_handlers

    - name: Enable and start Teleport
      ansible.builtin.systemd:
        name: "{{ teleport_service_name }}"
        enabled: true
        state: started
      when: not ansible_check_mode

    - name: Wait for Teleport auth listener
      ansible.builtin.wait_for:
        host: "{{ teleport_auth_listen_addr.split(':')[0] }}"
        port: "{{ teleport_auth_listen_addr.split(':')[1] | int }}"
        timeout: 60
      when: not ansible_check_mode

    - name: Render managed Teleport roles
      ansible.builtin.template:
        src: roles.yaml.j2
        dest: "{{ teleport_base_dir }}/resources/roles.yaml"
        owner: root
        group: root
        mode: "0640"
      when: teleport_managed_roles | length > 0

    - name: Apply managed Teleport roles
      ansible.builtin.command:
        cmd: "tctl create -f {{ teleport_base_dir }}/resources/roles.yaml"
      changed_when: false
      when:
        - not ansible_check_mode
        - teleport_managed_roles | length > 0

    - name: Render Authentik OIDC connector
      ansible.builtin.template:
        src: oidc-connector.yaml.j2
        dest: "{{ teleport_base_dir }}/resources/oidc-authentik.yaml"
        owner: root
        group: root
        mode: "0600"
      no_log: true
      when: teleport_oidc_enabled | bool

    - name: Apply Authentik OIDC connector
      ansible.builtin.command:
        cmd: "tctl create -f {{ teleport_base_dir }}/resources/oidc-authentik.yaml"
      changed_when: false
      no_log: true
      when:
        - not ansible_check_mode
        - teleport_oidc_enabled | bool

    - name: Report skipped Teleport OIDC connector
      ansible.builtin.debug:
        msg: "Teleport OIDC connector skipped; set TELEPORT_OIDC_CLIENT_ID and TELEPORT_OIDC_CLIENT_SECRET to link Authentik."
      when: not teleport_oidc_enabled | bool

    - name: Add Teleport local HTTP app route for HAProxy
      ansible.builtin.set_fact:
        edge_local_http_apps: "{{ (edge_local_http_apps | default([])) + [teleport_haproxy_app] }}"
      when: teleport_haproxy_enabled | bool

    - name: Add Teleport SSH proxy port to firewall extras
      ansible.builtin.set_fact:
        edge_firewall_public_tcp_ports_extra: "{{ ((edge_firewall_public_tcp_ports_extra | default([])) + [teleport_proxy_ssh_public_port | int]) | unique | list }}"
