---
- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true
  when: not ansible_check_mode

- name: Restart VPS edge routes
  ansible.builtin.systemd:
    name: "{{ edge_routing_service_name }}"
    state: restarted
    daemon_reload: true
  when: not ansible_check_mode

- name: Restart FRR
  ansible.builtin.systemd:
    name: frr
    state: restarted
  when: not ansible_check_mode
