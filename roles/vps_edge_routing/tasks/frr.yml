---
- name: Refresh apt cache before FRR package install
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  when: ansible_os_family == "Debian"

- name: Install FRR packages
  ansible.builtin.package:
    name: "{{ edge_frr_packages[ansible_os_family] | default(edge_frr_packages.Debian) }}"
    state: present

- name: Disable static route service when FRR is selected
  ansible.builtin.systemd:
    name: "{{ edge_routing_service_name }}"
    enabled: false
    state: stopped
  when:
    - "'edge_vps' in group_names"
    - not ansible_check_mode
  failed_when: false

- name: Remove static provider routes before FRR takes ownership
  ansible.builtin.command: "ip route del {{ provider_cidr }} dev {{ item.value.vps_if }}"
  loop: "{{ wireguard_links | dict2items }}"
  loop_control:
    label: "{{ item.value.vps_if }}"
  register: edge_routing_static_route_deletes
  changed_when: edge_routing_static_route_deletes.rc == 0
  failed_when: false
  when:
    - "'edge_vps' in group_names"
    - not ansible_check_mode

- name: Render FRR daemon toggles
  ansible.builtin.template:
    src: frr-daemons.j2
    dest: /etc/frr/daemons
    owner: frr
    group: frr
    mode: "0640"
  notify: Restart FRR

- name: Render FRR config
  ansible.builtin.template:
    src: frr.conf.j2
    dest: /etc/frr/frr.conf
    owner: frr
    group: frr
    mode: "0640"
  notify: Restart FRR

- name: Enable and start FRR
  ansible.builtin.systemd:
    name: frr
    enabled: true
    state: started
  when: not ansible_check_mode
