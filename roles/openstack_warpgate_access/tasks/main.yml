---
- name: Skip Warpgate node access when disabled
  ansible.builtin.debug:
    msg: "warpgate_enabled is false; skipping Warpgate SSH key authorization."
  when: not warpgate_enabled | bool

- name: Authorize Warpgate client key on node
  when:
    - warpgate_enabled | bool
    - warpgate_authorize_client_key | bool
  block:
    - name: Validate Warpgate client key fact
      ansible.builtin.assert:
        that:
          - hostvars[warpgate_vps_inventory_name].warpgate_client_public_key is defined
          - hostvars[warpgate_vps_inventory_name].warpgate_client_public_key is match('^ssh-')
        fail_msg: "Warpgate client public key is unavailable; run the vps_warpgate role before node access authorization."
        quiet: true

    - name: Install Warpgate SSH client key
      ansible.posix.authorized_key:
        user: "{{ warpgate_target_ssh_user }}"
        key: "{{ hostvars[warpgate_vps_inventory_name].warpgate_client_public_key }}"
        state: "{{ warpgate_authorized_key_state }}"
        manage_dir: true
