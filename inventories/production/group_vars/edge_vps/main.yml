---
edge_vps_ssh_user: "{{ lookup('env', 'EDGE_VPS_SSH_USER') | default('ansible', true) }}"
edge_vps_ssh_public_key_file: "{{ lookup('env', 'EDGE_VPS_SSH_PUBLIC_KEY_FILE') | default(inventory_dir ~ '/files/ssh/edge-vps.pub', true) }}"

ansible_user: "{{ edge_vps_ssh_user }}"
ansible_ssh_private_key_file: "{{ edge_vps_ssh_public_key_file }}"
ansible_ssh_common_args: "-o IdentitiesOnly=yes"

edge_vps_public_endpoint: "{{ lookup('env', 'EDGE_VPS_PUBLIC_ENDPOINT') | default(ansible_host, true) }}"
edge_vps_public_interface: null

edge_static_route_metric_base: 100

edge_proxy_enabled: true
edge_proxy_backend: haproxy
edge_proxy_manage_nginx_stream_include: true
edge_local_http_apps: "{{ [authentik_haproxy_app] if authentik_haproxy_enabled | bool else [] }}"
edge_proxy_haproxy_crowdsec_enabled: true
edge_openstack_domain: "{{ lookup('env', 'EDGE_OPENSTACK_DOMAIN') | default('openstack.' ~ edge_public_root_domain, true) }}"
edge_openstack_backend_host: "{{ lookup('env', 'EDGE_OPENSTACK_BACKEND_HOST') | default('10.50.0.50', true) }}"
edge_openstack_tls_cert_path: "{{ lookup('env', 'EDGE_OPENSTACK_TLS_CERT_PATH') | default('/etc/haproxy/certs/openstack.' ~ edge_public_root_domain ~ '.pem', true) }}"
edge_openstack_acme_domains: "{{ lookup('env', 'EDGE_OPENSTACK_ACME_DOMAINS') | default(edge_openstack_domain, true) | split(',') | map('trim') | reject('equalto', '') | list }}"
edge_proxy_haproxy_local_tls_routes:
  - name: openstack
    hostname_suffixes:
      - ".{{ edge_openstack_domain }}"
    backend_host: "{{ edge_openstack_backend_host }}"
    backend_port: 443
    tls_cert: "{{ edge_openstack_tls_cert_path }}"
    hsts: true
    redirect_http: false
edge_proxy_haproxy_cert_bundles: >-
  {{
    ([authentik_haproxy_cert_bundle] if (authentik_haproxy_pem_src | length > 0 or (authentik_haproxy_cert_src | length > 0 and authentik_haproxy_key_src | length > 0)) else [])
    + ([pomerium_haproxy_cert_bundle] if (pomerium_haproxy_pem_src | length > 0 or (pomerium_haproxy_cert_src | length > 0 and pomerium_haproxy_key_src | length > 0)) else [])
  }}
edge_proxy_acme_enabled: "{{ lookup('env', 'EDGE_ACME_ENABLED') | default('false', true) | bool }}"
edge_proxy_acme_email: "{{ lookup('env', 'EDGE_ACME_EMAIL') | default('', true) }}"
edge_proxy_acme_authenticator: "{{ lookup('env', 'EDGE_ACME_AUTHENTICATOR') | default('', true) }}"
edge_proxy_acme_extra_args: "{{ lookup('env', 'EDGE_ACME_EXTRA_ARGS') | default('', true) | split(' ') | map('trim') | reject('equalto', '') | list }}"
edge_proxy_acme_certbot_plugin_packages: "{{ lookup('env', 'EDGE_ACME_CERTBOT_PLUGIN_PACKAGES') | default('', true) | split(',') | map('trim') | reject('equalto', '') | list }}"
edge_proxy_acme_certificates:
  - name: "{{ authentik_domain }}"
    domains:
      - "{{ authentik_domain }}"
    haproxy_pem: "{{ authentik_haproxy_cert_path }}"
  - name: "{{ pomerium_authenticate_domain }}"
    domains: "{{ pomerium_haproxy_hostnames }}"
    haproxy_pem: "{{ pomerium_haproxy_cert_path }}"
  - name: "{{ edge_openstack_domain }}"
    domains: "{{ edge_openstack_acme_domains }}"
    haproxy_pem: "{{ edge_openstack_tls_cert_path }}"

edge_security_enabled: true
edge_security_crowdsec_enabled: true
edge_security_fail2ban_enabled: true

edge_firewall_enabled: true
edge_firewall_backend: ufw
edge_admin_ssh_sources: "{{ lookup('env', 'EDGE_ADMIN_SSH_SOURCES') | default('', true) | split(',') | map('trim') | reject('equalto', '') | list }}"
edge_firewall_require_admin_ssh_sources: "{{ lookup('env', 'EDGE_FIREWALL_REQUIRE_ADMIN_SSH_SOURCES') | default('false', true) | bool }}"
edge_firewall_wireguard_sources: "{{ lookup('env', 'EDGE_WIREGUARD_PUBLIC_SOURCES') | default('', true) | split(',') | map('trim') | reject('equalto', '') | list }}"
edge_firewall_require_wireguard_sources: "{{ lookup('env', 'EDGE_FIREWALL_REQUIRE_WIREGUARD_SOURCES') | default('false', true) | bool }}"
edge_firewall_denied_sources: []
edge_firewall_wireguard_tcp_sources: "{{ edge_metrics_scrape_sources }}"
edge_firewall_wireguard_tcp_ports_extra:
  - "{{ edge_metrics_node_exporter_port }}"
  - "{{ edge_security_crowdsec_prometheus_port }}"

edge_security_crowdsec_prometheus_enabled: true
edge_security_crowdsec_prometheus_port: "{{ lookup('env', 'EDGE_CROWDSEC_PROMETHEUS_PORT') | default('6060', true) | int }}"
edge_security_crowdsec_prometheus_level: full

authentik_enabled: true
authentik_domain: "{{ lookup('env', 'AUTHENTIK_DOMAIN') | default('auth.' ~ edge_public_root_domain, true) }}"
authentik_base_dir: "{{ lookup('env', 'AUTHENTIK_BASE_DIR') | default('/opt/edge/authentik', true) }}"
authentik_http_bind: 127.0.0.1:9000

# Enable after the configured HAProxy PEM path contains a certificate chain and
# private key for authentik_domain.
authentik_haproxy_enabled: true
authentik_haproxy_cert_path: "{{ lookup('env', 'AUTHENTIK_HAPROXY_CERT_PATH') | default('/etc/haproxy/certs/' ~ authentik_domain ~ '.pem', true) }}"
authentik_haproxy_pem_src: ""
authentik_haproxy_cert_src: ""
authentik_haproxy_chain_src: ""
authentik_haproxy_key_src: ""
authentik_haproxy_app:
  name: authentik
  hostnames:
    - "{{ authentik_domain }}"
  backend_host: 127.0.0.1
  backend_port: 9000
  tls_cert: "{{ authentik_haproxy_cert_path }}"
  hsts: true
authentik_haproxy_cert_bundle:
  name: "{{ authentik_domain }}"
  pem_src: "{{ authentik_haproxy_pem_src }}"
  cert_src: "{{ authentik_haproxy_cert_src }}"
  chain_src: "{{ authentik_haproxy_chain_src }}"
  key_src: "{{ authentik_haproxy_key_src }}"
  dest: "{{ authentik_haproxy_cert_path }}"

pomerium_enabled: true
pomerium_domain: "{{ lookup('env', 'POMERIUM_DOMAIN') | default('pomerium.' ~ edge_public_root_domain, true) }}"
pomerium_authenticate_domain: "{{ lookup('env', 'POMERIUM_AUTHENTICATE_DOMAIN') | default('ssh.' ~ edge_public_root_domain, true) }}"
pomerium_base_dir: "{{ lookup('env', 'POMERIUM_BASE_DIR') | default('/opt/edge/pomerium', true) }}"
pomerium_image_tag: "{{ lookup('env', 'POMERIUM_IMAGE_TAG') | default('v0.32.8', true) }}"
pomerium_ssh_public_port: "{{ lookup('env', 'POMERIUM_SSH_PUBLIC_PORT') | default('2222', true) | int }}"
pomerium_haproxy_enabled: true
pomerium_haproxy_hostnames: "{{ lookup('env', 'POMERIUM_HAPROXY_HOSTNAMES') | default(pomerium_authenticate_domain, true) | split(',') | map('trim') | list }}"
pomerium_haproxy_cert_path: "{{ lookup('env', 'POMERIUM_HAPROXY_CERT_PATH') | default('/etc/haproxy/certs/' ~ pomerium_authenticate_domain ~ '.pem', true) }}"
pomerium_haproxy_pem_src: ""
pomerium_haproxy_cert_src: ""
pomerium_haproxy_chain_src: ""
pomerium_haproxy_key_src: ""
pomerium_haproxy_cert_bundle:
  name: "{{ pomerium_authenticate_domain }}"
  pem_src: "{{ pomerium_haproxy_pem_src }}"
  cert_src: "{{ pomerium_haproxy_cert_src }}"
  chain_src: "{{ pomerium_haproxy_chain_src }}"
  key_src: "{{ pomerium_haproxy_key_src }}"
  dest: "{{ pomerium_haproxy_cert_path }}"
pomerium_idp_provider_url: "{{ lookup('env', 'POMERIUM_OIDC_PROVIDER_URL') | default('https://' ~ authentik_domain ~ '/application/o/pomerium/', true) }}"
pomerium_idp_client_id: "{{ lookup('env', 'POMERIUM_OIDC_CLIENT_ID') | default('', true) }}"
pomerium_idp_client_secret: "{{ lookup('env', 'POMERIUM_OIDC_CLIENT_SECRET') | default('', true) }}"
pomerium_ssh_routes: []

mc_router_enabled: true
