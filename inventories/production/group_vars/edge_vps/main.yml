---
edge_vps_ssh_user: "{{ lookup('env', 'EDGE_VPS_SSH_USER') | default('ansible', true) }}"
edge_vps_ssh_public_key_file: "{{ lookup('env', 'EDGE_VPS_SSH_PUBLIC_KEY_FILE') | default(inventory_dir ~ '/files/ssh/edge-vps.pub', true) }}"

ansible_user: "{{ edge_vps_ssh_user }}"
ansible_ssh_private_key_file: "{{ edge_vps_ssh_public_key_file }}"
ansible_ssh_common_args: "-o IdentitiesOnly=yes"

edge_vps_public_endpoint: "{{ lookup('env', 'EDGE_VPS_PUBLIC_ENDPOINT') | default(ansible_host, true) }}"
edge_vps_public_interface: null

edge_static_route_metric_base: 100

edge_proxy_enabled: true
edge_proxy_backend: haproxy
edge_proxy_manage_nginx_stream_include: true
edge_local_http_apps: "{{ [authentik_haproxy_app] if authentik_haproxy_enabled | bool else [] }}"
edge_proxy_haproxy_crowdsec_enabled: true
edge_control_plane_domain: "{{ lookup('env', 'EDGE_CONTROL_PLANE_DOMAIN') | default('control.' ~ edge_public_root_domain, true) }}"
edge_control_plane_backend_host: "{{ lookup('env', 'EDGE_CONTROL_PLANE_BACKEND_HOST') | default('10.200.0.50', true) }}"
edge_control_plane_tls_cert_path: "{{ lookup('env', 'EDGE_CONTROL_PLANE_TLS_CERT_PATH') | default('/etc/haproxy/certs/' ~ edge_control_plane_domain ~ '.pem', true) }}"
edge_proxy_haproxy_local_tls_routes:
  - name: control_plane
    hostname_suffixes:
      - ".{{ edge_control_plane_domain }}"
    backend_host: "{{ edge_control_plane_backend_host }}"
    backend_port: 443
    tls_cert: "{{ edge_control_plane_tls_cert_path }}"
    hsts: true
    redirect_http: false
edge_proxy_haproxy_cert_bundles: "{{ [authentik_haproxy_cert_bundle] if (authentik_haproxy_pem_src | length > 0 or (authentik_haproxy_cert_src | length > 0 and authentik_haproxy_key_src | length > 0)) else [] }}"

edge_security_enabled: true
edge_security_crowdsec_enabled: true
edge_security_fail2ban_enabled: true

edge_firewall_enabled: true
edge_firewall_backend: ufw
edge_admin_ssh_sources: []
edge_firewall_denied_sources: []
edge_firewall_wireguard_tcp_sources: "{{ edge_metrics_scrape_sources }}"
edge_firewall_wireguard_tcp_ports_extra:
  - "{{ edge_metrics_node_exporter_port }}"
  - "{{ edge_security_crowdsec_prometheus_port }}"

edge_security_crowdsec_prometheus_enabled: true
edge_security_crowdsec_prometheus_port: "{{ lookup('env', 'EDGE_CROWDSEC_PROMETHEUS_PORT') | default('6060', true) | int }}"
edge_security_crowdsec_prometheus_level: full

authentik_enabled: true
authentik_domain: "{{ lookup('env', 'AUTHENTIK_DOMAIN') | default('auth.' ~ edge_public_root_domain, true) }}"
authentik_base_dir: "{{ lookup('env', 'AUTHENTIK_BASE_DIR') | default('/opt/edge/authentik', true) }}"
authentik_http_bind: 127.0.0.1:9000

# Enable after the configured HAProxy PEM path contains a certificate chain and
# private key for authentik_domain.
authentik_haproxy_enabled: true
authentik_haproxy_cert_path: "{{ lookup('env', 'AUTHENTIK_HAPROXY_CERT_PATH') | default('/etc/haproxy/certs/' ~ authentik_domain ~ '.pem', true) }}"
authentik_haproxy_pem_src: ""
authentik_haproxy_cert_src: ""
authentik_haproxy_chain_src: ""
authentik_haproxy_key_src: ""
authentik_haproxy_app:
  name: authentik
  hostnames:
    - "{{ authentik_domain }}"
  backend_host: 127.0.0.1
  backend_port: 9000
  tls_cert: "{{ authentik_haproxy_cert_path }}"
  hsts: true
authentik_haproxy_cert_bundle:
  name: "{{ authentik_domain }}"
  pem_src: "{{ authentik_haproxy_pem_src }}"
  cert_src: "{{ authentik_haproxy_cert_src }}"
  chain_src: "{{ authentik_haproxy_chain_src }}"
  key_src: "{{ authentik_haproxy_key_src }}"
  dest: "{{ authentik_haproxy_cert_path }}"

warpgate_enabled: true
warpgate_domain: "{{ lookup('env', 'WARPGATE_DOMAIN') | default('warpgate.' ~ edge_public_root_domain, true) }}"
warpgate_external_host: "{{ warpgate_domain }}"
warpgate_base_dir: "{{ lookup('env', 'WARPGATE_BASE_DIR') | default('/opt/edge/warpgate', true) }}"
warpgate_http_bind_host: 127.0.0.1
warpgate_http_port: "{{ lookup('env', 'WARPGATE_HTTP_PORT') | default('8888', true) | int }}"
warpgate_ssh_public_port: "{{ lookup('env', 'WARPGATE_SSH_PUBLIC_PORT') | default('2222', true) | int }}"
warpgate_ssh_container_port: 2222
warpgate_haproxy_enabled: true
warpgate_haproxy_cert_path: "{{ lookup('env', 'WARPGATE_HAPROXY_CERT_PATH') | default('/etc/haproxy/certs/' ~ warpgate_domain ~ '.pem', true) }}"
warpgate_authentik_oidc_client_id: "{{ lookup('env', 'WARPGATE_OIDC_CLIENT_ID') | default('', true) }}"
warpgate_authentik_oidc_client_secret: "{{ lookup('env', 'WARPGATE_OIDC_CLIENT_SECRET') | default('', true) }}"
warpgate_sso_enabled: "{{ warpgate_authentik_oidc_client_id | length > 0 and warpgate_authentik_oidc_client_secret | length > 0 }}"
warpgate_manage_targets: true
