---
openstack_edge_ssh_user: "{{ lookup('env', 'OPENSTACK_EDGE_SSH_USER') | default('ansible', true) }}"
openstack_edge_ssh_public_key_file: "{{ lookup('env', 'OPENSTACK_EDGE_SSH_PUBLIC_KEY_FILE') | default(inventory_dir ~ '/files/ssh/openstack-edge.pub', true) }}"

ansible_user: "{{ openstack_edge_ssh_user }}"
ansible_become: true
ansible_ssh_private_key_file: "{{ openstack_edge_ssh_public_key_file }}"
ansible_ssh_common_args: "-o IdentitiesOnly=yes"

edge_gateway_provider_interface: null
edge_gateway_configure_snat_address: false
edge_gateway_use_snat: true
